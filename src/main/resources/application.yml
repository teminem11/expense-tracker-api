spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/expense_tracker}
    username: ${DB_USERNAME:expense_user}
    password: ${DB_PASSWORD:expense_password}
  jpa:
    hibernate.ddl-auto: validate
    open-in-view: false
  servlet.multipart:
    max-file-size: 5MB
    max-request-size: 5MB
server.port: ${PORT:8080}
app:
  jwt:
    secret: ${JWT_SECRET:change-this-development-secret-key-with-at-least-32-bytes}
    expiration: ${JWT_EXPIRATION:86400000}
  storage:
    provider: ${STORAGE_PROVIDER:local}
    local-directory: ${LOCAL_STORAGE_DIRECTORY:uploads}
  aws:
    region: ${AWS_REGION:eu-west-1}
    s3-bucket: ${AWS_S3_BUCKET:}
management.endpoints.web.exposure.include: health,info

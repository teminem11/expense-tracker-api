spring:
  datasource:
    url: jdbc:h2:mem:expense_tracker;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate.ddl-auto: create-drop
    open-in-view: false
  flyway:
    enabled: false
app:
  jwt:
    secret: integration-test-secret-key-that-is-at-least-thirty-two-bytes
    expiration: 60000
  storage:
    provider: local
    local-directory: target/test-uploads

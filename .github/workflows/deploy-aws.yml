name: Deploy to AWS ECS

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: production-deployment
  cancel-in-progress: false

jobs:
  deploy:
    name: Build, push and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
      ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
      ECS_SERVICE: ${{ vars.ECS_SERVICE }}
      ECS_TASK_FAMILY: ${{ vars.ECS_TASK_FAMILY }}
      ECS_CONTAINER_NAME: ${{ vars.ECS_CONTAINER_NAME }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Validate deployment configuration
        shell: bash
        run: |
          required=(AWS_REGION ECR_REPOSITORY ECS_CLUSTER ECS_SERVICE ECS_TASK_FAMILY ECS_CONTAINER_NAME)
          for name in "${required[@]}"; do
            if [ -z "${!name}" ]; then
              echo "Missing GitHub environment variable: $name" >&2
              exit 1
            fi
          done

      - name: Configure AWS credentials through OIDC
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push immutable image
        id: image
        shell: bash
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          image="$REGISTRY/$ECR_REPOSITORY:${GITHUB_SHA}"
          docker build --tag "$image" .
          docker push "$image"
          echo "uri=$image" >> "$GITHUB_OUTPUT"

      - name: Download current task definition
        shell: bash
        run: |
          aws ecs describe-task-definition \
            --task-definition "$ECS_TASK_FAMILY" \
            --query taskDefinition > task-definition.json

      - name: Render task definition
        id: task-definition
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.ECS_CONTAINER_NAME }}
          image: ${{ steps.image.outputs.uri }}

      - name: Deploy task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-definition.outputs.task-definition }}
          cluster: ${{ env.ECS_CLUSTER }}
          service: ${{ env.ECS_SERVICE }}
          wait-for-service-stability: true

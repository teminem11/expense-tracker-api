services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: expense_tracker
      POSTGRES_USER: expense_user
      POSTGRES_PASSWORD: expense_password
    ports: ["5432:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U expense_user -d expense_tracker"]
      interval: 5s
      timeout: 3s
      retries: 10
  api:
    profiles: ["full"]
    build: .
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/expense_tracker
      DB_USERNAME: expense_user
      DB_PASSWORD: expense_password
      JWT_SECRET: ${JWT_SECRET:-change-this-development-secret-key-with-at-least-32-bytes}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      LOCAL_STORAGE_DIRECTORY: /app/uploads
      AWS_REGION: ${AWS_REGION:-eu-west-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
    ports: ["8080:8080"]
    volumes: ["receipt_data:/app/uploads"]
    depends_on:
      postgres:
        condition: service_healthy
volumes:
  postgres_data:
  receipt_data:
